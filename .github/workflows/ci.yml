name: CI

on:
  push:
    branches:
      - main
      - "claude/**"
  pull_request:
    branches:
      - main

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # The integration tests drive the relay against real Postgres databases:
  # `sqlx::test` creates one throwaway database per test from this URL.
  DATABASE_URL: postgres://keeplin:keeplin@localhost:5432/keeplin

jobs:
  test:
    name: Check, Test & Lint
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: keeplin
          POSTGRES_PASSWORD: keeplin
          POSTGRES_DB: keeplin
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U keeplin -d keeplin"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      # Contractual docs: every .rs has a companion .md and every companion
      # carries a `## Graph context` section (the two-layer navigation model).
      - name: Check companion docs
        run: ./scripts/check-docs.sh

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Cargo & build artifacts
        uses: Swatinem/rust-cache@v2

      - name: cargo fmt (workspace)
        run: cargo fmt --check --all

      - name: cargo test (workspace)
        run: cargo test --workspace

      # --all-targets lints test and bench code too, matching the command the README
      # tells contributors to run locally. It also fully subsumes `cargo check`.
      - name: cargo clippy (workspace)
        run: cargo clippy --workspace --all-targets -- -D warnings

      # Prebuilt binary instead of `cargo install cargo-audit` — compiling the tool
      # from source added minutes to every run for no additional coverage.
      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      - name: Audit dependencies
        run: cargo audit

  graph:
    name: Knowledge graph up to date
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Pinned so the AST extraction and the committed graph are built by the
      # same version; contributors must use the same pin locally.
      - name: Install graphify
        run: python -m pip install --quiet "graphifyy==0.9.25"

      # Fails if graphify-out/ is stale: re-extracts the AST graph and diffs the
      # code structure against the committed graph.json (GRAPHIFY_REQUIRED makes a
      # missing install a hard error rather than a silent skip).
      - name: Check knowledge graph is up to date
        env:
          GRAPHIFY_REQUIRED: "1"
        run: ./scripts/check-graph.sh
